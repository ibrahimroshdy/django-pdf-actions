[tool:pytest]
DJANGO_SETTINGS_MODULE = tests.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --maxfail=10
    --durations=10
    --cov=django_pdf_actions
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=85
    --junitxml=test-results.xml
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    compatibility: marks tests as compatibility tests
    performance: marks tests as performance tests
    admin: marks tests as admin tests
    management: marks tests as management command tests
    models: marks tests as model tests
    actions: marks tests as action tests
    utils: marks tests as utility tests
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:django.utils.deprecation
    ignore::UserWarning:reportlab
    ignore::UserWarning:arabic_reshaper
    ignore::UserWarning:bidi
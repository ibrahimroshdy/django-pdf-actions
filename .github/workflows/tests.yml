name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests weekly to catch dependency issues
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        django-version: ['3.2', '4.0', '4.1', '4.2', '5.0']
        exclude:
          # Django 5.0 requires Python 3.10 or higher
          - django-version: '5.0'
            python-version: '3.8'
          - django-version: '5.0'
            python-version: '3.9'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          **/requirements*.txt
          pyproject.toml

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}-py${{ matrix.python-version }}-dj${{ matrix.django-version }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}-py${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype6-dev libjpeg-dev libpng-dev zlib1g-dev
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools
        pip install -e .  # Install package locally
        pip install Django~=${{ matrix.django-version }}.0
        pip install coverage pytest pytest-django pytest-cov pytest-xdist
        pip install django-model-utils>=4.3.1
        pip install arabic-reshaper python-bidi
        pip install reportlab
        pip install Pillow  # For image handling tests
        
    - name: Create test directories
      run: |
        mkdir -p static/assets/fonts
        mkdir -p media/export_pdf/logos
        
    - name: Run Tests with Coverage
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SETTINGS_MODULE: tests.settings
        COVERAGE_PROCESS_START: .coveragerc
      run: |
        python -m pytest \
          --cov=django_pdf_actions \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=85 \
          --junitxml=test-results.xml \
          -v \
          --tb=short \
          --maxfail=5
        
    - name: Run Tests in Parallel (for faster execution)
      if: matrix.python-version == '3.11' && matrix.django-version == '4.2'
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SETTINGS_MODULE: tests.settings
      run: |
        python -m pytest \
          --cov=django_pdf_actions \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=85 \
          --junitxml=test-results-parallel.xml \
          -v \
          --tb=short \
          --maxfail=5 \
          -n auto
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.django-version }}
        path: |
          test-results*.xml
          htmlcov/
          coverage.xml
          
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        pip install -e .
        
    - name: Run Black (code formatting check)
      run: |
        black --check --diff .
        
    - name: Run isort (import sorting check)
      run: |
        isort --check-only --diff .
        
    - name: Run Flake8 (linting)
      run: |
        flake8 django_pdf_actions/ tests/ --max-line-length=100 --extend-ignore=E203,W503
        
    - name: Run MyPy (type checking)
      run: |
        mypy django_pdf_actions/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install security dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        pip install -e .
        
    - name: Run Safety (dependency vulnerability check)
      run: |
        safety check --json --output safety-report.json || true
        
    - name: Run Bandit (security linting)
      run: |
        bandit -r django_pdf_actions/ -f json -o bandit-report.json || true
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.12']
        django-version: ['3.2', '5.0']
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools
        pip install -e .
        pip install Django~=${{ matrix.django-version }}.0
        pip install pytest pytest-django
        pip install django-model-utils>=4.3.1
        pip install arabic-reshaper python-bidi
        pip install reportlab
        pip install Pillow
        
    - name: Run Compatibility Tests
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SETTINGS_MODULE: tests.settings
      run: |
        python -m pytest tests/test_compatibility.py -v --tb=short

  performance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools
        pip install -e .
        pip install Django~=4.2.0
        pip install pytest pytest-django pytest-benchmark
        pip install django-model-utils>=4.3.1
        pip install arabic-reshaper python-bidi
        pip install reportlab
        pip install Pillow
        
    - name: Run Performance Tests
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SETTINGS_MODULE: tests.settings
      run: |
        python -m pytest tests/test_compatibility.py::PerformanceCompatibilityTest -v --benchmark-only --benchmark-sort=mean

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: |
        python -m build
        
    - name: Check package
      run: |
        twine check dist/*
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/ 